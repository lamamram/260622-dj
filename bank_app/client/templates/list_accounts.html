{% extends "base.html" %}
{% block title %}Bank App - accounts{% endblock  %}
{% block header %}

<div class="text-center my-5">
    <h1 class="display-5 fw-bolder text-white mb-2"> display accounts</h1>
    <p class="lead text-white-50 mb-4"></p>
</div>

{% endblock %}
{% block content %}
<!-- Edit form section -->
<section class="bg-light py-5">
    <div class="container px-5 my-5">
        <div class="row gx-5 justify-content-center">
            <div class="col-lg-6">
               
                <div class="card">
                    <div class="card-body p-5">
                       <table class="table table-striped">  
                            <thead>
                              <th scope="col">number</th>
                              <th scope="col"> solde </th>
                              <th scope="col"> type </th>
                             </thead>
                            <tbody>
                            {% for account in accounts %}
                            <tr>
                                <!-- l'attribut pk de la directive url contient la valeur clé primaire (pk)
                                 : account.pk qui existe toujours dans un model django
                                 on peut utiliser de pk dans les urls.py de l'app
                                 -->
                                <td><a href="{% url "account_detail" pk=account.pk %}">{{account.number}}</a> </td>
                                <td> {{account.balance}} </td>
                                <td> {{account.type}} </td>
                            </tr>
                            {% endfor %}
                            </tbody>
                       </table>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="{% url 'home' %}" class="text-decoration-none">
                        <i class="bi bi-arrow-left"></i> Back to Home
                   </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock  %}
