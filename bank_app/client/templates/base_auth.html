{% load static %}
<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>{% block title %}Bank App{% endblock %}</title>
        <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
        {% block extra_css %}{% endblock %}
    </head>
    <body class="bg-dark">
        <!-- Barre de marque minimale -->
        <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="bi bi-bank me-2"></i>Bank App
                </a>
            </div>
        </nav>

        <!-- Zone principale centrée verticalement -->
        <div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 56px - 60px);">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                        {% block auth_card %}{% endblock %}
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="py-3 bg-dark border-top border-secondary">
            <div class="container">
                <p class="m-0 text-center text-secondary small">Copyright &copy; Bank App 2026</p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        {% block extra_js %}{% endblock %}
    </body>
</html>
